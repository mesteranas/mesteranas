<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="stylesheet" href="Style.css">
	</head>
	<body>
		<div class="header">
			<h1>تواصل معنا</h1>
			<p>
			عزيزي المستخدم:
			<br>
			أهلاً وسهلاً بك في صفحة التواصل الخاصة بفريق كوكب المكفوفين التقني، املأ النموذج واضغط إرسال.
			<br>
			سيتم الرد عليك في أقرب وقت ممكن.
			</p>
			</div>
			<form>
				<fieldset method="get">
				<input type="text" placeholder="الاسم الأول" name="first-name">
				<input type="text" placeholder="اسم العائلة" name="last-name">
				<input type="email" placeholder="البريد الإلكتروني" name="email">
				<textarea id="topic-title" type="text" placeholder="عنوان الموضوع" name="topic-title"></textarea>
				<textarea id="topic-text" type="text" placeholder="نص الموضوع" name="topic-text"></textarea>
				<div class="button">
					<button>إرسال</button>
				</div>
			</fieldset>
			</form>
		</div>
	</body>
</html>
